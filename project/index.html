<!DOCTYPE html>
<html lang="en" id="htmlRoot">

<head id="headElement">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Auth Workspace - Welcome</title>
    <link rel="stylesheet" href="style.css" id="mainStyleLink">
</head>

<body id="loginBody">
    <div id="mainWrapper" class="wrapper">
        <div id="authCard" class="card">
            <div id="tabContainer" class="tabs">
                <button id="loginTabBtn" class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button id="signupTabBtn" class="tab-btn" onclick="switchTab('signup')">Signup</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <h2 id="loginTitle">Welcome Back</h2>
                <div id="loginEmailGroup" class="input-group">
                    <label id="loginEmailLabel" for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" required>
                </div>
                <div id="loginPassGroup" class="input-group">
                    <label id="loginPassLabel" for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <button type="submit" id="loginSubmitBtn" class="primary-btn">Login</button>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" class="auth-form">
                <h2 id="signupTitle">Create Account</h2>
                <div id="signupEmailGroup" class="input-group">
                    <label id="signupEmailLabel" for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" placeholder="Enter your email" required>
                </div>
                <div id="signupPassGroup" class="input-group">
                    <label id="signupPassLabel" for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" placeholder="Create a password" required>
                </div>
                <button type="submit" id="signupSubmitBtn" class="primary-btn">Sign Up</button>
            </form>
        </div>
    </div>

    <!-- Error Popup Container -->
    <div id="popupContainer" class="popup-container hidden">
        <div id="popupContent" class="popup-content">
            <span id="popupMessage"></span>
        </div>
    </div>

    <script src="script.js" id="mainScript"></script>
</body>

</html>
