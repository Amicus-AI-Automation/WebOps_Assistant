name: Sync to Azure DevOps

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:
    types: [closed]
    branches:
      - main
      - master
  release:
    types: [published]
  repository_dispatch:
    types: [sync-to-azure]
  workflow_dispatch:
    inputs:
      force_sync:
        description: "Force push all refs to Azure DevOps (use with caution)"
        required: false
        default: "false"
        type: boolean
      dry_run:
        description: "Perform a dry run without actually pushing"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: azure-devops-sync
  cancel-in-progress: false

env:
  AZURE_DEVOPS_ORG: ${{ vars.AZURE_DEVOPS_ORG }}
  AZURE_DEVOPS_PROJECT: ${{ vars.AZURE_DEVOPS_PROJECT }}
  AZURE_DEVOPS_REPO: ${{ vars.AZURE_DEVOPS_REPO }}
  GIT_AUTHOR_NAME: "GitHub Actions Bot"
  GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"

permissions:
  contents: read
  actions: read

jobs:
  validate:
    name: Pre-flight Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_sync: ${{ steps.check.outputs.should_sync }}
    steps:
      - name: Validate required secrets and variables
        id: check
        run: |
          echo "Validating configuration"
          ERRORS=0
          if [ -z "${{ vars.AZURE_DEVOPS_ORG }}" ]; then
            echo "::error::Missing repository variable: AZURE_DEVOPS_ORG"
            ERRORS=$((ERRORS + 1))
          fi
          if [ -z "${{ vars.AZURE_DEVOPS_PROJECT }}" ]; then
            echo "::error::Missing repository variable: AZURE_DEVOPS_PROJECT"
            ERRORS=$((ERRORS + 1))
          fi
          if [ -z "${{ vars.AZURE_DEVOPS_REPO }}" ]; then
            echo "::error::Missing repository variable: AZURE_DEVOPS_REPO"
            ERRORS=$((ERRORS + 1))
          fi
          if [ -z "${{ secrets.AZURE_DEVOPS_PAT }}" ]; then
            echo "::error::Missing secret: AZURE_DEVOPS_PAT"
            ERRORS=$((ERRORS + 1))
          fi
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS configuration error(s) found. See above."
            echo "should_sync=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "All configuration validated successfully."
          echo "should_sync=true" >> "$GITHUB_OUTPUT"

      - name: Check if PR was merged
        if: github.event_name == 'pull_request'
        run: |
          if [ "${{ github.event.pull_request.merged }}" != "true" ]; then
            echo "::notice::PR was closed without merging. Skipping sync."
            echo "should_sync=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

  sync:
    name: Sync to Azure DevOps
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.should_sync == 'true'
    timeout-minutes: 30
    environment:
      name: azure-devops
      url: https://dev.azure.com/${{ vars.AZURE_DEVOPS_ORG }}/${{ vars.AZURE_DEVOPS_PROJECT }}/_git/${{ vars.AZURE_DEVOPS_REPO }}
    steps:
      - name: Checkout repository (full clone)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "${{ env.GIT_AUTHOR_NAME }}"
          git config user.email "${{ env.GIT_AUTHOR_EMAIL }}"

      - name: Fetch all remote branches and tags
        run: |
          echo "Fetching all remote refs"
          CURRENT_BRANCH=$(git symbolic-ref --short HEAD 2>/dev/null || echo "")
          for branch in $(git ls-remote --heads origin | awk '{print $2}' | sed 's|refs/heads/||'); do
            if [ "$branch" != "$CURRENT_BRANCH" ]; then
              echo "  Fetching branch: $branch"
              git fetch origin "+refs/heads/${branch}:refs/heads/${branch}" --force
            else
              echo "  Skipping checked-out branch: $branch (already up to date via checkout)"
            fi
          done
          git fetch origin '+refs/tags/*:refs/tags/*' --force
          echo ""
          echo "Branches:"
          git branch -a
          echo ""
          echo "Tags:"
          git tag -l

      - name: Configure Azure DevOps remote
        env:
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
        run: |
          git config --local credential.helper ""
          ADO_ORG=$(echo "${{ vars.AZURE_DEVOPS_ORG }}" | tr -d '[:space:]')
          ADO_PROJECT=$(echo "${{ vars.AZURE_DEVOPS_PROJECT }}" | tr -d '[:space:]')
          ADO_REPO=$(echo "${{ vars.AZURE_DEVOPS_REPO }}" | tr -d '[:space:]')
          echo "Resolved Azure DevOps coordinates:"
          echo "  Org:     [${ADO_ORG}]"
          echo "  Project: [${ADO_PROJECT}]"
          echo "  Repo:    [${ADO_REPO}]"
          if [ -z "$ADO_ORG" ] || [ -z "$ADO_PROJECT" ] || [ -z "$ADO_REPO" ]; then
            echo "::error::One or more Azure DevOps variables are empty after trimming."
            exit 1
          fi
          ENCODED_PAT=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${AZURE_DEVOPS_PAT}', safe=''))")
          AZURE_REPO_URL="https://${ENCODED_PAT}@dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_git/${ADO_REPO}"
          git remote remove azure 2>/dev/null || true
          git remote add azure "${AZURE_REPO_URL}"
          echo "Azure DevOps remote configured."
          echo "  Target: https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_git/${ADO_REPO}"
          if git ls-remote azure HEAD > /dev/null 2>&1; then
            echo "Successfully connected to Azure DevOps repository."
          else
            echo "::error::Cannot reach Azure DevOps repository. Check PAT, org, project, and repo name."
            echo "  Verify URL: https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_git/${ADO_REPO}"
            echo "::error::Common causes: 1) PAT expired or wrong scope 2) Typo in org/project/repo 3) Repo does not exist 4) PAT for wrong org"
            exit 1
          fi

      - name: Dry run check
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "::notice::DRY RUN MODE - No changes will be pushed."
          echo "Branches:"
          git branch -a
          echo ""
          echo "Tags:"
          git tag -l
          echo ""
          echo "Diff summary vs Azure DevOps:"
          git push azure --mirror --dry-run 2>&1 || echo "Could not reach Azure DevOps for dry-run comparison."

      - name: Sync all branches and tags to Azure DevOps
        if: github.event.inputs.dry_run != 'true'
        env:
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
          GIT_TERMINAL_PROMPT: 0
        run: |
          echo "Starting sync to Azure DevOps"
          echo "  Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          PUSH_ARGS="--mirror"
          if [ "${{ github.event.inputs.force_sync }}" == "true" ]; then
            echo "FORCE SYNC enabled - will overwrite divergent refs."
            PUSH_ARGS="--mirror --force"
          fi
          MAX_RETRIES=3
          RETRY_DELAY=10
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo ""
            echo "Push attempt $attempt of $MAX_RETRIES"
            if git push azure $PUSH_ARGS 2>&1; then
              echo ""
              echo "Sync completed successfully on attempt $attempt."
              exit 0
            else
              EXIT_CODE=$?
              echo ""
              echo "::warning::Push failed with exit code $EXIT_CODE"
              if [ "$attempt" -lt "$MAX_RETRIES" ]; then
                echo "Retrying in ${RETRY_DELAY}s..."
                sleep $RETRY_DELAY
                RETRY_DELAY=$((RETRY_DELAY * 2))
              else
                echo "::error::Sync failed after $MAX_RETRIES attempts with exit code $EXIT_CODE."
                exit 1
              fi
            fi
          done

      - name: Verify sync
        if: github.event.inputs.dry_run != 'true'
        run: |
          echo "Sync Summary:"
          echo "  Branches synced: $(git branch | wc -l)"
          echo "  Tags synced:     $(git tag -l | wc -l)"
          echo "  Last commit:     $(git log -1 --format='%h %s')"
          echo "  Pushed to:       https://dev.azure.com/${{ vars.AZURE_DEVOPS_ORG }}/${{ vars.AZURE_DEVOPS_PROJECT }}/_git/${{ vars.AZURE_DEVOPS_REPO }}"

      - name: Cleanup
        if: always()
        run: |
          git remote remove azure 2>/dev/null || true
          echo "Cleanup completed - Azure remote removed."

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [validate, sync]
    if: failure()
    timeout-minutes: 5
    steps:
      - name: Create failure summary
        run: |
          echo "## Azure DevOps Sync Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Workflow** | ${{ github.workflow }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run ID** | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch/Ref** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Troubleshooting" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify AZURE_DEVOPS_PAT secret is valid and not expired." >> $GITHUB_STEP_SUMMARY
          echo "2. Verify AZURE_DEVOPS_ORG, AZURE_DEVOPS_PROJECT, and AZURE_DEVOPS_REPO variables are correct." >> $GITHUB_STEP_SUMMARY
          echo "3. Ensure the PAT has Code (Read and Write) scope." >> $GITHUB_STEP_SUMMARY
          echo "4. Check if the Azure DevOps repo exists and is accessible." >> $GITHUB_STEP_SUMMARY

  summary:
    name: Sync Summary
    runs-on: ubuntu-latest
    needs: [validate, sync]
    if: success()
    timeout-minutes: 5
    steps:
      - name: Create success summary
        run: |
          echo "## Azure DevOps Sync Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Target** | [Azure DevOps Repo](https://dev.azure.com/${{ vars.AZURE_DEVOPS_ORG }}/${{ vars.AZURE_DEVOPS_PROJECT }}/_git/${{ vars.AZURE_DEVOPS_REPO }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch/Ref** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
